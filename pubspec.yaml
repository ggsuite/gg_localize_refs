repository: https://github.com/ggsuite/gg_localize_refs.git

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  args: ^2.5.0
  gg_args: ^2.0.4
  gg_console_colors: ^2.1.4
  gg_log: ^1.0.6
  gg_process: ^1.1.6
  path: ^1.8.0
