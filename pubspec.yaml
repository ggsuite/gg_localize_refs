name: gg_localize_refs
description: gg_localize_refs allows to switch a local package and its local checkouts to local pathes
version: 2.3.0
publish_to: none
repository: https://github.com/ggsuite/gg_localize_refs.git

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  args: ^2.5.0
  gg_args: ^2.0.4
  gg_console_colors: ^2.1.4
  gg_log: ^1.0.6
  gg_process: ^1.1.6
  path: ^1.8.0
  yaml: ^3.1.2
  yaml_edit: ^2.2.1
  gg_project_root: ^1.0.4
  pubspec_parse: ^1.3.0
  gg_git: ^3.0.7
  gg_publish:
    path: ../gg_publish # git:  url: git@github.com:ggsuite/gg_publish.git  tag_pattern: versionversion: ^3.4.0
# test_dep:
#   git:
#     url: git@github.com:test_dep/test_dep.git
#     tag_pattern: "{{version}}"
#   version: ^2.0.1

dev_dependencies:
  gg_capture_print: ^1.0.9
  lints: ^6.0.0
  test: ^1.25.8

executables:
  gg_localize_refs: