  yaml_edit: ^2.2.1
  gg_project_root: ^1.0.4
  pubspec_parse: ^1.3.0
  gg_git: ^3.0.7
  gg_publish: ^3.3.1
dev_dependencies:
  gg_capture_print: ^1.0.9
  lints: ^6.0.0
  test: ^1.25.8

executables:
  gg_localize_refs: