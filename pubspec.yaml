name: gg_localize_refs
description: gg_localize_refs allows to switch a local package and its local checkouts to local pathes
version: 2.1.1
publish_to: none
repository: https://github.com/ggsuite/gg_localize_refs.git

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  args: ^2.5.0
  gg_args:
    git:
      url: git@github.com:ggsuite/gg_args.git
      ref: ticket-test
  gg_console_colors: ^2.1.4
  gg_log:
    git:
      url: git@github.com:ggsuite/gg_log.git
      ref: ticket-test
  gg_process: ^1.1.6
  path: ^1.8.0
  yaml: ^3.1.2
  yaml_edit: ^2.2.1
  gg_project_root:
    git:
      url: git@github.com:ggsuite/gg_project_root.git
      ref: ticket-test
  pubspec_parse: ^1.3.0
  gg_git:
    git:
      url: git@github.com:ggsuite/gg_git.git
      ref: ticket-test
  gg_publish:
    git:
      url: git@github.com:ggsuite/gg_publish.git
      ref: ticket-test
dev_dependencies:
  gg_capture_print: ^1.0.9
  lints: ^6.0.0
  test: ^1.25.8

executables:
  gg_localize_refs: